<!DOCTYPE html>
<html lang="en" data-season="">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Pray Without Ceasing — Daily Office</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=IBM+Plex+Sans:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="office.css">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <link rel="icon" href="icon.png" type="image/png">
</head>
<body>
  <nav id="nav">
    <div id="nav-inner">
      <!-- Row 1: logo | ← date → | ⚙ -->
      <div class="nav-row nav-top">
        <a id="nav-brand" href="#" aria-label="Pray Without Ceasing — go to today">
          <svg class="nav-logo" width="20" height="20" viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <circle cx="12" cy="12" r="6.6" stroke="currentColor" stroke-width="1.5"/>
            <rect x="10.85" y="1.5" width="2.3" height="21" rx="0.6" fill="currentColor"/>
            <rect x="1.5" y="10.85" width="21" height="2.3" rx="0.6" fill="currentColor"/>
          </svg>
          <span class="nav-brand-name">Pray Without Ceasing</span>
        </a>
        <div class="nav-date-nav">
          <a id="nav-prev" class="nav-arrow nav-arrow--hidden" aria-label="Previous day">&#8592;</a>
          <span id="nav-date-wrapper" title="Tap to choose a date">
            <svg class="nav-cal-icon" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true">
              <rect x="3" y="4.5" width="18" height="17" rx="2.5"/><path d="M3 9h18M8 2.5v4M16 2.5v4"/>
            </svg>
            <span id="nav-date" class="nav-date--hidden">—</span>
            <input type="date" id="nav-date-picker" aria-label="Go to date">
          </span>
          <a id="nav-next" class="nav-arrow nav-arrow--hidden" aria-label="Next day">&#8594;</a>
        </div>
        <button id="nav-settings-btn" aria-label="Settings" aria-expanded="false">
          <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
          </svg>
        </button>
      </div>
      <!-- Row 2: Morning Prayer | Evening Prayer -->
      <div class="nav-row nav-office-row">
        <a id="nav-mp" role="button">Morning Prayer</a>
        <a id="nav-ep" role="button">Evening Prayer</a>
      </div>
    </div><!-- #nav-inner -->
  </nav>

  <!-- Settings bottom sheet -->
  <div id="settings-sheet" class="settings-sheet" aria-hidden="true" aria-label="Settings">
    <div class="settings-backdrop" id="settings-backdrop"></div>
    <div class="settings-panel" role="dialog">
      <div class="settings-header">
        <span>Settings</span>
        <button id="settings-close-btn" aria-label="Close settings">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" aria-hidden="true"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div class="settings-body">
        <div class="settings-row">
          <div>
            <div class="settings-label">View</div>
            <div class="settings-sublabel">Read along, or show the full book page</div>
          </div>
          <div class="settings-mini-seg" id="view-mode-seg">
            <button id="view-mode-office" class="is-active" aria-pressed="true">Office</button>
            <button id="view-mode-book" aria-pressed="false">Book</button>
          </div>
        </div>
        <label class="settings-row">
          <span class="settings-label">Translation</span>
          <select id="nav-translation" aria-label="Bible translation">
            <option value="nrsvue">NRSVUE</option>
            <option value="kjv">KJV</option>
          </select>
        </label>
        <label class="settings-row">
          <span class="settings-label">Theme</span>
          <button id="theme-toggle" aria-label="Toggle theme">Light</button>
        </label>
        <label class="settings-row">
          <span class="settings-label">Text size</span>
          <button id="font-size-toggle" aria-label="Adjust text size">Medium</button>
        </label>
        <div class="settings-row">
          <div>
            <div class="settings-label">Lectionary</div>
            <div class="settings-sublabel">BAS 1962 or RCL Daily Readings</div>
          </div>
          <div class="settings-mini-seg" id="lectionary-seg">
            <button id="lectionary-bas" class="is-active" aria-pressed="true">BAS</button>
            <button id="lectionary-rcl" aria-pressed="false">RCL</button>
          </div>
        </div>
        <div class="settings-row" id="rcl-track-row" style="display:none">
          <div>
            <div class="settings-label">RCL Track</div>
            <div class="settings-sublabel">Semicontinuous or Complementary</div>
          </div>
          <div class="settings-mini-seg" id="rcl-track-seg">
            <button id="rcl-track-semi" class="is-active" aria-pressed="true">Semi</button>
            <button id="rcl-track-comp" aria-pressed="false">Comp</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div id="nav-spacer" aria-hidden="true"></div>

  <main id="main">
    <header id="day-header">
      <div id="day-brand">Pray Without Ceasing</div>
      <div id="day-office-name"></div>
      <h1 id="day-title"></h1>
      <div id="day-subtitle"></div>
      <div id="day-meta"></div>
      <div id="day-office-controls"></div>
    </header>
    <div id="office-content">
      <p class="loading">Loading…</p>
    </div>
  </main>

  <script src="capacitor-plugins.js"></script>
  <script type="module" src="app.js"></script>
</body>
</html>
