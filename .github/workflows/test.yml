name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          npm install
          python3 -m pip install pymupdf pytest

      - name: Fetch sources
        run: make fetch-sources

      - name: Extract data
        run: |
          python3 tools/extract_offices.py
          python3 tools/normalize_offices.py
          python3 tools/extract_psalter.py
          python3 tools/extract_collects.py || true
          python3 tools/validate_corrections.py
          python3 tools/apply_corrections.py
          python3 tools/convert_lectionary.py --window 12
          python3 tools/update_extract_manifest.py
        # extract_collects has known failures (BUGS.md): Ash Wednesday p.281, Matthias p.407

      - name: Full test suite
        run: make test

      - name: Data integrity check
        run: make check-integrity
