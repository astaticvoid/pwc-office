name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          npm install
          python3 -m pip install pymupdf pytest striprtf

      - name: Fetch sources
        run: make fetch-sources

      - name: Extract data
        run: make extract

      - name: Full test suite
        run: make test

      - name: Data integrity check
        run: make check-integrity
