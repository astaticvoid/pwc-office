name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          npm install
          python3 -m pip install pymupdf

      - name: Unit tests
        run: make test-unit

      - name: Liturgical QA gate
        run: make qa || true
        # Skips gracefully when data/ is absent (copyrighted content)

      - name: Data integrity check
        run: make check-integrity || true
        # Skips gracefully when data/ is absent (copyrighted content)
